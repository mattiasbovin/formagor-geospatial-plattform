<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcGIS — 14 förmågor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:transparent;
  --surface:rgba(21,31,51,.7);--surface2:rgba(28,40,64,.7);
  --blue:#0079C1;--blue-light:#3aa3e0;
  --teal:#007A87;--teal-light:#00a5b5;
  --orange:#d4792a;--purple:#8b5cf6;
  --text:#e8ecf2;--text-dim:#8899b0;--text-muted:#556680;
  --border:rgba(37,48,73,.6);--border-light:rgba(46,61,88,.6);
  --radius:10px;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-size:16px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem 1rem}

/* ─── Orbital ─── */
.orbital{position:relative;width:min(340px,80vw);aspect-ratio:1;margin:0 auto .8rem}
.orbital-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:86px;height:86px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(26,34,53,.9),rgba(10,15,26,.9));
  border:1.5px solid var(--border-light);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;
  box-shadow:0 0 40px rgba(0,121,193,.08)}
.orbital-center-num{font-family:var(--serif);font-size:1.6rem;color:#fff;line-height:1}
.orbital-center-label{font-family:var(--mono);font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:.1rem}

.orbit-ring{position:absolute;border-radius:50%;border:1px solid rgba(37,48,73,.35);top:50%;left:50%}
.orbit-ring-1{width:58%;height:58%;transform:translate(-50%,-50%);animation:rr 80s linear infinite}
.orbit-ring-2{width:80%;height:80%;transform:translate(-50%,-50%);animation:rr 120s linear infinite reverse;border-style:dashed;border-color:rgba(37,48,73,.2)}
@keyframes rr{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.orbital svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

.cat-node{position:absolute;z-index:5;cursor:pointer}
.cat-node-inner{width:76px;height:76px;border-radius:50%;background:rgba(21,31,51,.85);border:1.5px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s,transform .3s}
.cat-node:hover .cat-node-inner,.cat-node.active .cat-node-inner{
  border-color:var(--nc);box-shadow:0 0 24px var(--ng);transform:scale(1.08)}
.cat-node-letter{font-family:var(--serif);font-size:1.1rem;color:var(--nc);line-height:1}
.cat-node-name{font-family:var(--mono);font-size:.4rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-top:.1rem}
.cat-node-count{font-family:var(--mono);font-size:.4rem;color:var(--text-muted);margin-top:.05rem}

.cat-node-a{top:0;left:50%;transform:translateX(-50%);--nc:var(--blue-light);--ng:rgba(0,121,193,.2)}
.cat-node-b{top:50%;right:0;transform:translateY(-50%);--nc:var(--teal-light);--ng:rgba(0,122,135,.2)}
.cat-node-c{bottom:0;left:50%;transform:translateX(-50%);--nc:var(--orange);--ng:rgba(212,121,42,.2)}
.cat-node-d{top:50%;left:0;transform:translateY(-50%);--nc:var(--purple);--ng:rgba(139,92,246,.2)}

/* ─── Detail ─── */
.detail{width:100%;max-width:420px;overflow:hidden;
  transition:max-height .45s cubic-bezier(.25,.46,.45,.94),opacity .35s;max-height:0;opacity:0}
.detail.open{max-height:700px;opacity:1}

.detail-header{display:flex;align-items:center;gap:.6rem;padding:.55rem .8rem;
  border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;background:var(--surface)}
.detail-bar{width:3px;height:22px;border-radius:2px}
.detail-header-text p{font-family:var(--mono);font-size:.42rem;letter-spacing:.1em;text-transform:uppercase}
.detail-header-text h3{font-size:.78rem;font-weight:600;color:#fff;line-height:1.2}

.detail-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);
  background:var(--surface);padding:.3rem .8rem .6rem}

.cap-item{display:flex;align-items:flex-start;gap:.5rem;padding:.4rem 0;border-bottom:1px solid var(--border)}
.cap-item:last-child{border-bottom:none}
.cap-id{font-family:var(--mono);font-size:.5rem;font-weight:600;background:rgba(0,0,0,.3);
  padding:.15rem .35rem;border-radius:3px;flex-shrink:0;min-width:24px;text-align:center;margin-top:1px}
.cap-name{font-size:.72rem;font-weight:600;color:#fff;margin-bottom:.08rem;line-height:1.25}
.cap-desc{font-size:.62rem;color:var(--text-dim);line-height:1.45}
.cap-prod{font-family:var(--mono);font-size:.5rem;color:var(--text-muted);margin-top:.12rem}

/* ─── Enablers ─── */
.enablers{width:100%;max-width:420px;margin-top:.7rem;padding:.5rem .8rem;
  border:1px dashed var(--border);border-radius:var(--radius);background:rgba(21,31,51,.4)}
.enablers-label{font-family:var(--mono);font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.3rem}
.enabler-row{display:flex;gap:.35rem;flex-wrap:wrap}
.enabler-tag{font-size:.58rem;color:var(--text-dim);padding:.15rem .4rem;background:rgba(26,34,53,.7);border-radius:3px;border:1px solid var(--border)}

@media(max-width:380px){
  .orbital{width:260px}
  .cat-node-inner{width:60px;height:60px}
  .cat-node-letter{font-size:.9rem}
  .orbital-center{width:68px;height:68px}
  .orbital-center-num{font-size:1.2rem}
}
</style>
</head>
<body>

<div class="orbital">
  <div class="orbit-ring orbit-ring-1"></div>
  <div class="orbit-ring orbit-ring-2"></div>
  <svg viewBox="0 0 340 340">
    <line x1="170" y1="125" x2="170" y2="76" stroke="rgba(58,163,224,.15)" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="215" y1="170" x2="264" y2="170" stroke="rgba(0,165,181,.15)" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="170" y1="215" x2="170" y2="264" stroke="rgba(212,121,42,.15)" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="125" y1="170" x2="76" y2="170" stroke="rgba(139,92,246,.15)" stroke-width="1" stroke-dasharray="3 2"/>
  </svg>
  <div class="orbital-center">
    <span class="orbital-center-num">14</span>
    <span class="orbital-center-label">Förmågor</span>
  </div>
  <div class="cat-node cat-node-a" id="na" onclick="t('a')"><div class="cat-node-inner"><span class="cat-node-letter">A</span><span class="cat-node-name">Förstå</span><span class="cat-node-count">4</span></div></div>
  <div class="cat-node cat-node-b" id="nb" onclick="t('b')"><div class="cat-node-inner"><span class="cat-node-letter">B</span><span class="cat-node-name">Agera</span><span class="cat-node-count">4</span></div></div>
  <div class="cat-node cat-node-c" id="nc" onclick="t('c')"><div class="cat-node-inner"><span class="cat-node-letter">C</span><span class="cat-node-name">Övervaka</span><span class="cat-node-count">3</span></div></div>
  <div class="cat-node cat-node-d" id="nd" onclick="t('d')"><div class="cat-node-inner"><span class="cat-node-letter">D</span><span class="cat-node-name">Dela</span><span class="cat-node-count">3</span></div></div>
</div>

<div class="detail" id="det"></div>

<div class="enablers">
  <div class="enablers-label">Infrastrukturella enablers</div>
  <div class="enabler-row">
    <span class="enabler-tag">Geodatalagring & förvaltning</span>
    <span class="enabler-tag">CAD/BIM-integration</span>
    <span class="enabler-tag">Enterprise-systemintegration</span>
  </div>
</div>

<script>
const D={
  a:{c:'var(--blue-light)',t:'Förstå — insikt & analys',l:'Kategori A',f:[
    {i:'F1',n:'Kartografi & visualisering',d:'Professionella kartor — tematiska, referenskartor, atlaser.',p:'ArcGIS Pro · Map Viewer'},
    {i:'F2',n:'Spatial analys & datavetenskap',d:'Modellering, multikriterieanalys, geostatistik, maskininlärning.',p:'Spatial Analyst · Notebooks'},
    {i:'F3',n:'Bild- & fjärranalys',d:'Spektralanalys, förändringsdetektion, tidsserieanalys.',p:'ArcGIS Image · Image Analyst'},
    {i:'F4',n:'3D-visualisering & analys',d:'Terrängmodeller, stadsmodeller, inomhusmiljöer.',p:'3D Analyst · Scene Viewer'}]},
  b:{c:'var(--teal-light)',t:'Agera — operativ förmåga',l:'Kategori B',f:[
    {i:'F5',n:'Dashboards & lägesbilder',d:'Nulägesbilder med kartor, diagram och indikatorer.',p:'Dashboards · Experience Builder'},
    {i:'F6',n:'Mobila arbetsflöden',d:'Datainsamling, inspektion, navigering — online och offline.',p:'Field Maps · Survey123 · Workforce'},
    {i:'F7',n:'Ruttning & logistik',d:'Ruttoptimering, körtidsberäkning, servicezoner.',p:'Network Analyst · Fleet Management'},
    {i:'F8',n:'Geokodning & berikning',d:'Adresser till koordinater, attributberikning.',p:'Geocoding · Enrich · Spatial Join'}]},
  c:{c:'var(--orange)',t:'Övervaka — realtid & automation',l:'Kategori C',f:[
    {i:'F9',n:'IoT & realtidsanalys',d:'Sensornätverk, realtidsströmmar, geoevents, triggers.',p:'ArcGIS Velocity · GeoEvent Server'},
    {i:'F10',n:'AI & automatiserad tolkning',d:'Objektidentifiering, klassificering, förändringsdetektion.',p:'Deep Learning · GeoAI'},
    {i:'F11',n:'Big Data & bearbetning',d:'Massiva datamängder — rörelsedata, mobilitetsflöden.',p:'Velocity · Big Data Store'}]},
  d:{c:'var(--purple)',t:'Dela & integrera',l:'Kategori D',f:[
    {i:'F12',n:'Portaler & datadelning',d:'Publicering, delning och åtkomstkontroll.',p:'Portal · Hub · Living Atlas'},
    {i:'F13',n:'Reality Capture',d:'Drönare, LiDAR, fotogrammetri → 3D-modeller.',p:'ArcGIS Reality · Site Scan'},
    {i:'F14',n:'Storytelling',d:'Berättelsedrivna informationsprodukter.',p:'StoryMaps · Media Maps · Briefings'}]}
};
let cur=null;
function t(id){
  const el=document.getElementById('det');
  document.querySelectorAll('.cat-node').forEach(n=>n.classList.remove('active'));
  if(cur===id){el.classList.remove('open');cur=null;return}
  cur=id;document.getElementById('n'+id).classList.add('active');
  const c=D[id];
  el.style.setProperty('--active-color',c.c);
  el.innerHTML=`<div class="detail-header"><div class="detail-bar" style="background:${c.c}"></div><div class="detail-header-text"><p style="color:${c.c}">${c.l}</p><h3>${c.t}</h3></div></div><div class="detail-body">${c.f.map(x=>`<div class="cap-item"><span class="cap-id" style="color:${c.c}">${x.i}</span><div><div class="cap-name">${x.n}</div><div class="cap-desc">${x.d}</div><div class="cap-prod">${x.p}</div></div></div>`).join('')}</div>`;
  el.classList.add('open');
}
</script>
</body>
</html>
