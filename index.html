<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcGIS-plattformen — 14 förmågor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1a2235;
  --surface:#151f33;--surface2:#1c2840;
  --blue:#0079C1;--blue-light:#3aa3e0;
  --teal:#007A87;--teal-light:#00a5b5;
  --orange:#d4792a;--purple:#8b5cf6;
  --text:#e8ecf2;--text-dim:#8899b0;--text-muted:#556680;
  --border:#253049;--border-light:#2e3d58;
  --radius:12px;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-size:24px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6;
  display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem}
::selection{background:var(--blue);color:#fff}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px}

/* ─── Orbital ─── */
.orbital{position:relative;width:min(460px,88vw);aspect-ratio:1;margin:0.5rem auto 1.5rem}
.orbital-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,var(--bg3),var(--bg));
  border:2px solid var(--border-light);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;
  box-shadow:0 0 50px rgba(0,121,193,.08)}
.orbital-center-num{font-family:var(--serif);font-size:2rem;color:#fff;line-height:1}
.orbital-center-label{font-family:var(--mono);font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:.15rem}

.orbit-ring{position:absolute;border-radius:50%;border:1px solid rgba(37,48,73,.4);top:50%;left:50%}
.orbit-ring-1{width:60%;height:60%;transform:translate(-50%,-50%);animation:rr 80s linear infinite}
.orbit-ring-2{width:82%;height:82%;transform:translate(-50%,-50%);animation:rr 120s linear infinite reverse;border-style:dashed;border-color:rgba(37,48,73,.25)}
@keyframes rr{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.orbital svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

.cat-node{position:absolute;z-index:5;cursor:pointer}
.cat-node-inner{width:96px;height:96px;border-radius:50%;background:var(--surface);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s,transform .3s}
.cat-node:hover .cat-node-inner,.cat-node.active .cat-node-inner{
  border-color:var(--nc);box-shadow:0 0 30px var(--ng);transform:scale(1.06)}
.cat-node-letter{font-family:var(--serif);font-size:1.3rem;color:var(--nc);line-height:1}
.cat-node-name{font-family:var(--mono);font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);margin-top:.15rem}
.cat-node-count{font-family:var(--mono);font-size:.48rem;color:var(--text-muted);margin-top:.1rem}

.cat-node-a{top:0;left:50%;transform:translateX(-50%);--nc:var(--blue-light);--ng:rgba(0,121,193,.2)}
.cat-node-b{top:50%;right:0;transform:translateY(-50%);--nc:var(--teal-light);--ng:rgba(0,122,135,.2)}
.cat-node-c{bottom:0;left:50%;transform:translateX(-50%);--nc:var(--orange);--ng:rgba(212,121,42,.2)}
.cat-node-d{top:50%;left:0;transform:translateY(-50%);--nc:var(--purple);--ng:rgba(139,92,246,.2)}

/* ─── Detail ─── */
.detail{width:100%;max-width:520px;overflow:hidden;
  transition:max-height .5s cubic-bezier(.25,.46,.45,.94),opacity .4s;max-height:0;opacity:0}
.detail.open{max-height:900px;opacity:1}

.detail-header{display:flex;align-items:center;gap:.7rem;padding:.7rem 1rem;
  border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;background:var(--surface)}
.detail-bar{width:4px;height:26px;border-radius:2px}
.detail-header-text p{font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase}
.detail-header-text h3{font-size:.88rem;font-weight:600;color:#fff;line-height:1.2}

.detail-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:var(--surface);padding:.4rem 1rem .7rem}

.cap-item{display:flex;align-items:flex-start;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border)}
.cap-item:last-child{border-bottom:none}
.cap-id{font-family:var(--mono);font-size:.58rem;font-weight:600;background:rgba(0,0,0,.25);
  padding:.18rem .4rem;border-radius:4px;flex-shrink:0;min-width:26px;text-align:center;margin-top:1px}
.cap-name{font-size:.78rem;font-weight:600;color:#fff;margin-bottom:.1rem;line-height:1.3}
.cap-desc{font-size:.68rem;color:var(--text-dim);line-height:1.5}
.cap-prod{font-family:var(--mono);font-size:.55rem;color:var(--text-muted);margin-top:.15rem}

/* ─── Enablers ─── */
.enablers{width:100%;max-width:520px;margin-top:1.2rem;padding:.65rem 1rem;
  border:1px dashed var(--border);border-radius:var(--radius);background:rgba(21,31,51,.5)}
.enablers-label{font-family:var(--mono);font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.35rem}
.enabler-row{display:flex;gap:.4rem;flex-wrap:wrap}
.enabler-tag{font-size:.62rem;color:var(--text-dim);padding:.18rem .5rem;background:var(--bg3);border-radius:4px;border:1px solid var(--border)}

@media(max-width:420px){
  .orbital{width:300px}
  .cat-node-inner{width:72px;height:72px}
  .cat-node-letter{font-size:1rem}
  .orbital-center{width:84px;height:84px}
  .orbital-center-num{font-size:1.5rem}
}
</style>
</head>
<body>

<div class="orbital">
  <div class="orbit-ring orbit-ring-1"></div>
  <div class="orbit-ring orbit-ring-2"></div>
  <svg viewBox="0 0 460 460">
    <line x1="230" y1="165" x2="230" y2="96" stroke="rgba(58,163,224,.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="295" y1="230" x2="364" y2="230" stroke="rgba(0,165,181,.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="230" y1="295" x2="230" y2="364" stroke="rgba(212,121,42,.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="165" y1="230" x2="96" y2="230" stroke="rgba(139,92,246,.18)" stroke-width="1.5" stroke-dasharray="4 3"/>
  </svg>
  <div class="orbital-center">
    <span class="orbital-center-num">14</span>
    <span class="orbital-center-label">Förmågor</span>
  </div>
  <div class="cat-node cat-node-a" id="na" onclick="t('a')"><div class="cat-node-inner"><span class="cat-node-letter">A</span><span class="cat-node-name">Förstå</span><span class="cat-node-count">4</span></div></div>
  <div class="cat-node cat-node-b" id="nb" onclick="t('b')"><div class="cat-node-inner"><span class="cat-node-letter">B</span><span class="cat-node-name">Agera</span><span class="cat-node-count">4</span></div></div>
  <div class="cat-node cat-node-c" id="nc" onclick="t('c')"><div class="cat-node-inner"><span class="cat-node-letter">C</span><span class="cat-node-name">Övervaka</span><span class="cat-node-count">3</span></div></div>
  <div class="cat-node cat-node-d" id="nd" onclick="t('d')"><div class="cat-node-inner"><span class="cat-node-letter">D</span><span class="cat-node-name">Dela</span><span class="cat-node-count">3</span></div></div>
</div>

<div class="detail" id="det"></div>

<div class="enablers">
  <div class="enablers-label">Infrastrukturella enablers</div>
  <div class="enabler-row">
    <span class="enabler-tag">Geodatalagring & förvaltning</span>
    <span class="enabler-tag">CAD/BIM-integration</span>
    <span class="enabler-tag">Enterprise-systemintegration</span>
  </div>
</div>

<script>
const D={
  a:{c:'var(--blue-light)',t:'Förstå — insikt & analys',l:'Kategori A',f:[
    {i:'F1',n:'Kartografi & geografisk visualisering',d:'Professionella kartor digitalt och i tryck — tematiska kartor, referenskartor, atlaser.',p:'ArcGIS Pro · Map Viewer · Layout'},
    {i:'F2',n:'Avancerad spatial analys & datavetenskap',d:'Geografisk modellering, multikriterieanalys, geostatistik och maskininlärning.',p:'Spatial Analyst · Geostatistical Analyst · Notebooks'},
    {i:'F3',n:'Bild- & fjärranalys',d:'Bearbeta och klassificera bilder och rasterdata. Spektralanalys, förändringsdetektion.',p:'ArcGIS Image · Image Analyst · Raster Analytics'},
    {i:'F4',n:'3D-visualisering & analys',d:'Terrängmodeller, stadsmodeller, inomhusmiljöer. Siktlinjer, skugganalys.',p:'3D Analyst · Scene Viewer · ArcGIS Urban'}]},
  b:{c:'var(--teal-light)',t:'Agera — operativ förmåga',l:'Kategori B',f:[
    {i:'F5',n:'Operativa dashboards & lägesbilder',d:'Integrerade nulägesbilder med kartor, diagram och indikatorer.',p:'ArcGIS Dashboards · Experience Builder'},
    {i:'F6',n:'Mobila arbetsflöden & fältapplikationer',d:'Konfigurerbara appar för datainsamling, inspektion och navigering — online och offline.',p:'Field Maps · Survey123 · QuickCapture · Workforce'},
    {i:'F7',n:'Ruttning, logistik & zonindelning',d:'Ruttoptimering, körtidsberäkning och servicezoner.',p:'Network Analyst · Route · Fleet Management'},
    {i:'F8',n:'Geokodning & spatial berikning',d:'Koppla verksamhetsdata till geografi — adresser till koordinater, berikning baserat på plats.',p:'Geocoding · Enrich · Spatial Join'}]},
  c:{c:'var(--orange)',t:'Övervaka — realtid & automation',l:'Kategori C',f:[
    {i:'F9',n:'IoT & realtidsanalys',d:'Integration med sensornätverk, realtidsströmmar, geoevents och automatiserade triggers.',p:'ArcGIS Velocity · GeoEvent Server'},
    {i:'F10',n:'AI & automatiserad tolkning',d:'Djupinlärning för objektidentifiering, klassificering och förändringsdetektion.',p:'Deep Learning · Pretrained Models · GeoAI'},
    {i:'F11',n:'Big Data & storskalig bearbetning',d:'Analys och visualisering av massiva datamängder — rörelsemönster, transaktionsdata, mobilitetsflöden.',p:'Velocity · Big Data Store · Spark-integration'}]},
  d:{c:'var(--purple)',t:'Dela & integrera — samverkan',l:'Kategori D',f:[
    {i:'F12',n:'Informationsportaler & datadelning',d:'Portaler för publicering, delning och åtkomstkontroll av kartor, data och appar.',p:'ArcGIS Portal · Hub · Open Data · Living Atlas'},
    {i:'F13',n:'Reality Capture & digital tvillingproduktion',d:'Konvertera rådata från drönare, LiDAR och fotogrammetri till 3D-modeller och punktmoln.',p:'ArcGIS Reality · Site Scan · Drone2Map'},
    {i:'F14',n:'Narrativ & rumslig storytelling',d:'Berättelsedrivna informationsprodukter med kartor, text, media och interaktiva element.',p:'ArcGIS StoryMaps · Media Maps · Briefings'}]}
};
let cur=null;
function t(id){
  const el=document.getElementById('det');
  document.querySelectorAll('.cat-node').forEach(n=>n.classList.remove('active'));
  if(cur===id){el.classList.remove('open');cur=null;return}
  cur=id;document.getElementById('n'+id).classList.add('active');
  const c=D[id];
  el.style.setProperty('--active-color',c.c);
  el.innerHTML=`<div class="detail-header"><div class="detail-bar" style="background:${c.c}"></div><div class="detail-header-text"><p style="color:${c.c}">${c.l}</p><h3>${c.t}</h3></div></div><div class="detail-body">${c.f.map(x=>`<div class="cap-item"><span class="cap-id" style="color:${c.c}">${x.i}</span><div><div class="cap-name">${x.n}</div><div class="cap-desc">${x.d}</div><div class="cap-prod">${x.p}</div></div></div>`).join('')}</div>`;
  el.classList.add('open');
}
</script>
</body>
</html>
